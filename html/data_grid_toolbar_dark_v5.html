
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap {
    background: #0D1117;
    padding: 1.25rem 1.25rem 1rem;
    border-radius: 12px;
    font-family: var(--font-sans);
  }
  .top-bar {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 12px;
    border-bottom: 1px solid #2A3D58;
    margin-bottom: 12px;
  }
  .burger {
    width: 34px; height: 34px; display: flex; flex-direction: column;
    justify-content: center; gap: 5px; cursor: pointer;
    border-radius: 8px; padding: 7px;
    background: #2A4A70; border: 2px solid #6A9AC8; flex-shrink: 0;
  }
  .burger span { display: block; height: 2px; background: #C0E0FA; border-radius: 2px; }
  .heading { font-size: 17px; font-weight: 500; color: #D6EAFB; flex: 1; }
  .badge-new {
    font-size: 11px; background: #0F2A45; color: #5CC8FF;
    border-radius: 20px; padding: 4px 11px; font-weight: 500;
    border: 2px solid #2A6090; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .dot-pulse { width: 6px; height: 6px; border-radius: 50%; background: #5CC8FF; animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .time-badge {
    font-size: 11px; color: #FFAA55; background: #231508;
    border: 2px solid #804010; border-radius: 20px; padding: 4px 11px; white-space: nowrap;
  }

  .action-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding-bottom: 12px;
    border-bottom: 1px solid #2A3D58;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 13px; font-weight: 500; padding: 7px 14px;
    border-radius: 8px; cursor: pointer; white-space: nowrap;
    border: 2px solid #6A9AC8;
    background: #2A4A70; color: #C8E8FF;
  }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .btn:hover { background: #3A5E8A; color: #EAF6FF; }

  .btn-export {
    border-color: #7AAA30; background: #304010; color: #D8F060;
  }
  .btn-export:hover { background: #3C5014; color: #EEFF90; }

  .btn-save {
    border-color: #C06010; background: #3A1E08; color: #FFCC80;
  }
  .btn-save:hover { background: #4A2810; color: #FFE0A8; }

  .btn-info {
    border-color: #30A0D8; background: #0C304A; color: #70E0FF;
  }
  .btn-info:hover { background: #103C5C; color: #A0F0FF; }

  .divider { width: 2px; height: 30px; background: #2A3D58; border-radius: 2px; margin: 0 2px; flex-shrink: 0; }

  .filter-bar {
    display: flex; align-items: center; gap: 6px; flex-wrap: nowrap;
    overflow: hidden; padding-top: 10px;
  }
  .filter-label {
    font-size: 11px; color: #5A8AAA; font-weight: 500;
    white-space: nowrap; letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0;
  }
  .filter-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; background: #141E2E;
    border: 1.5px solid #2A3D58;
    border-radius: 20px; padding: 4px 11px;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .filter-pill:hover { border-color: #4A7AAA; }
  .filter-pill .fname { color: #5A8AAA; font-size: 11px; }
  .filter-pill .arrow { color: #2A3D58; font-size: 9px; }
  .filter-pill .fval { color: #A8D8F8; font-weight: 500; }
  .filter-pill .remove {
    display: inline-flex; align-items: center; justify-content: center;
    width: 15px; height: 15px; border-radius: 50%;
    background: #223040; color: #5A80A0; font-size: 10px; cursor: pointer; margin-left: 2px;
  }
  .filter-pill .remove:hover { color: #FFAA55; background: #2A1A0A; }

  .filter-spacer { flex: 1; }
  .btn-ghost {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: #7AAAC8;
    background: #182636; border: 1.5px solid #2A3D58;
    cursor: pointer; padding: 5px 10px; border-radius: 8px; white-space: nowrap; flex-shrink: 0;
  }
  .btn-ghost:hover { border-color: #4A7AAA; color: #A8D8F8; background: #1E3048; }
  .btn-ghost svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }
</style>

<div class="wrap">
  <div class="top-bar">
    <div class="burger"><span></span><span></span><span></span></div>
    <span class="heading">Customer Orders</span>
    <div class="badge-new"><div class="dot-pulse"></div>New data available</div>
    <div class="time-badge">Fetched 12:20</div>
  </div>

  <div class="action-row">
    <button class="btn">
      <svg viewBox="0 0 16 16"><path d="M2 4h12M4 8h8M6 12h4" stroke-linecap="round"/></svg>
      Columns
    </button>
    <button class="btn">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l2.5 2.5" stroke-linecap="round"/></svg>
      UTC+1
    </button>
    <button class="btn">
      <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h12" stroke-linecap="round"/></svg>
      Density
    </button>
    <div class="divider"></div>
    <button class="btn btn-export">
      <svg viewBox="0 0 16 16"><path d="M3 10v3h10v-3M8 3v7M5.5 7.5L8 10l2.5-2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Export
    </button>
    <button class="btn btn-save">
      <svg viewBox="0 0 16 16"><path d="M3 3h8l2 2v8H3V3z" stroke-linecap="round" stroke-linejoin="round"/><rect x="5" y="9" width="6" height="4" rx="0.5"/><rect x="5" y="3" width="4" height="3" rx="0.5"/></svg>
      Save view
    </button>
    <button class="btn btn-info">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 7v5M8 5.5v.5" stroke-linecap="round"/></svg>
      Timezone info
    </button>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Filters</span>
    <div class="filter-pill">
      <span class="fname">Status</span><span class="arrow">›</span>
      <span class="fval">Active</span><span class="remove">✕</span>
    </div>
    <div class="filter-pill">
      <span class="fname">Region</span><span class="arrow">›</span>
      <span class="fval">Europe</span><span class="remove">✕</span>
    </div>
    <div class="filter-pill">
      <span class="fname">Amount</span><span class="arrow">›</span>
      <span class="fval">&gt; 500</span><span class="remove">✕</span>
    </div>
    <div class="filter-pill">
      <span class="fname">Date</span><span class="arrow">›</span>
      <span class="fval">This month</span><span class="remove">✕</span>
    </div>
    <div class="filter-spacer"></div>
    <button class="btn-ghost">
      <svg viewBox="0 0 16 16"><path d="M3 8a5 5 0 1 1 1.5 3.6M3 12V8h4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Reset columns
    </button>
    <button class="btn-ghost">
      <svg viewBox="0 0 16 16"><path d="M3 4h10M5 4l.5 8h5L11 4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.5 7v4M9.5 7v4" stroke-linecap="round"/></svg>
      Clear filters
    </button>
  </div>
</div>
